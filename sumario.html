<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumário</title>

    <style>

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow-y: auto;
            overflow-x: hidden;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
        }

        #fundo-escuro {
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 30px 0;
            background:
                linear-gradient(
                    to bottom,
                    rgba(0,0,0,0.55),
                    rgba(0,0,0,0.88)
                ),
                url('Fundo pg1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ===== SUMÁRIO ===== */

        .menu-sumario {
            width: 60%;
            margin: 50px auto;
            padding: 30px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        details {
            padding: 10px;
        }

        summary {
            font-size: 2rem;
            letter-spacing: 3px;
            color: #f4d8a4;
            list-style: none;
            cursor: default;
        }

        /* Remove seta padrão do details em todos os browsers */
        summary::-webkit-details-marker {
            display: none;
        }

        ul {
            margin-top: 20px;
            padding-left: 20px;
        }

        li {
            color: #fff;
            margin: 12px 0;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        li a {
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
        }

        li a:hover {
            color: #ffcc66;
            text-shadow: 0 0 10px rgba(255,200,100,0.6);
            margin-left: 5px;
        }

        /* ===== MENU DE NAVEGAÇÃO ===== */

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
            margin-bottom: 30px;
            padding: 0 16px;
            width: 100%;
        }

        .menu a {
            text-decoration: none;
        }

        .menu button {
            width: 280px;
            padding: 18px;
            background: linear-gradient(
                180deg,
                rgba(70,0,0,0.9),
                rgba(15,15,15,0.95)
            );
            border: 2px solid #a11;
            color: #f4d8a4;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow:
                0 0 10px rgba(255,0,0,0.3),
                inset 0 0 10px rgba(255,255,255,0.08);
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            min-height: 48px;
            -webkit-appearance: none;
            appearance: none;
        }

        .menu button:hover,
        .menu button:active {
            transform: scale(1.05);
            background: linear-gradient(
                180deg,
                rgba(120,0,0,1),
                rgba(30,0,0,1)
            );
            box-shadow:
                0 0 25px rgba(255,0,0,0.7),
                0 0 50px rgba(255,120,0,0.3);
        }

        /* ===== RESPONSIVIDADE MOBILE ===== */

        @media (max-width: 768px) {

            #fundo-escuro {
                padding: 20px 0 30px;
            }

            .menu-sumario {
                width: 92%;
                margin: 20px auto;
                padding: 20px 16px;
            }

            summary {
                font-size: clamp(1.1rem, 5vw, 1.5rem);
                letter-spacing: 1px;
                text-align: center;
                line-height: 1.4;
            }

            ul {
                padding-left: 0;
                margin-top: 16px;
            }

            li {
                font-size: 0.95rem;
                margin: 10px 0;
                text-align: center;
                list-style: none;
            }

            li a {
                display: block;
                width: 100%;
                padding: 14px 10px;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 8px;
                font-size: clamp(0.8rem, 3.5vw, 0.95rem);
                letter-spacing: 1px;
            }

            li a:hover,
            li a:active {
                color: #ffcc66;
                text-shadow: 0 0 10px rgba(255,200,100,0.6);
                margin-left: 0;
                background: rgba(255,200,100,0.06);
            }

            .menu {
                flex-direction: column;
                align-items: center;
                gap: 12px;
                padding: 0 20px;
                margin-top: 8px;
            }

            .menu button {
                width: min(320px, 90vw);
                padding: 15px;
                font-size: clamp(0.8rem, 3.5vw, 0.95rem);
                letter-spacing: 1px;
            }
        }

        /* ===== TELAS MUITO PEQUENAS ===== */

        @media (max-width: 360px) {

            .menu-sumario {
                width: 96%;
                padding: 16px 12px;
            }

            summary {
                font-size: 1rem;
            }

            li a {
                padding: 12px 8px;
                font-size: 0.78rem;
            }
        }

        /* ===== LANDSCAPE MOBILE ===== */

        @media (max-height: 500px) and (orientation: landscape) {

            #fundo-escuro {
                padding: 16px 0 20px;
            }

            .menu-sumario {
                width: 85%;
                margin: 12px auto;
                padding: 16px 20px;
            }

            summary {
                font-size: 1.2rem;
            }

            li {
                margin: 8px 0;
            }

            .menu {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 6px;
            }

            .menu button {
                width: auto;
                min-width: 180px;
                padding: 12px 16px;
                font-size: 0.8rem;
            }
        }

    </style>
</head>

<body>

    <div id="fundo-escuro">

        <div class="menu-sumario">

            <details open>

                <summary>SUMÁRIO DO ARTEBOOK</summary>

                <ul>

                    <li><a href="pg31.html">A ESCALADA DO OLIMPO</a></li>
                    <li><a href="pg41.html">O LEGADO VISUAL DA TRILOGIA GREGA</a></li>
                    <li><a href="creditos.html">CRÉDITOS</a></li>
                </ul>

            </details>

        </div>

        <div class="menu">
            <a href="projeto-artbook-god-of-war.html">
                <button>Voltar ao início</button>
            </a>
            <a href="pg2.html">
                <button>Voltar Página 2</button>
            </a>
            <a href="pg4.html">
                <button>Continuar Página 4</button>
            </a>
        </div>

    </div>

</body>
</html>
