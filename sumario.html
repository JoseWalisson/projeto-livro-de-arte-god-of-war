    <title>Sumário</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

    overflow-y:auto;
    overflow-x:hidden;

    font-family:
    Impact,
    Haettenschweiler,
    'Arial Narrow Bold',
    sans-serif;
}

#fundo-escuro{

    flex-direction:column;

    width:100vw;

    min-height:100vh;

    display:flex;

    justify-content:flex-start;

    align-items:center;

    padding:30px 0;

    background:
    linear-gradient(
    to bottom,
    rgba(0,0,0,0.55),
    rgba(0,0,0,0.88)
    ),
    url('Fundo pg1.png');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

        main{
            width:70%;
            max-width:1000px;

            padding:60px;

            background:rgba(0,0,0,0.35);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(4px);

            border-radius:10px;

            color:white;

            text-align:center;

            box-shadow:
            0 0 40px rgba(0,0,0,0.6);
        }

        h1{

            font-size:4rem;

            margin-bottom:30px;

            color:#f4d8a4;

            letter-spacing:4px;

            text-transform:uppercase;
        }

        p{

            font-size:1.2rem;

            line-height:2;

            color:rgba(255,255,255,0.85);
        }

    .botao1, .botao2 {
        padding-right: 1em;
    }

    .menu button{

      width:320px;
      padding:18px;
      margin: 1em 1em;

      background:linear-gradient(
      180deg,
      rgba(70,0,0,0.9),
      rgba(15,15,15,0.95));

      border:2px solid #a11;
      color:#f4d8a4;

      font-size:1.2rem;
      letter-spacing:3px;
      text-transform:uppercase;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 0 10px rgba(255,0,0,0.3),
      inset 0 0 10px rgba(255,255,255,0.08);
    }

    .menu button:hover{

      transform:scale(1.05);

      background:linear-gradient(
      180deg,
      rgba(120,0,0,1),
      rgba(30,0,0,1));

      box-shadow:
      0 0 25px rgba(255,0,0,0.7),
      0 0 50px rgba(255,120,0,0.3);
    }


    .menu-sumario{
        width:60%;
        margin:50px auto;
        padding:30px;

        background:rgba(0,0,0,0.6);
        border:1px solid rgba(255,215,0,0.2);

        box-shadow:0 0 30px rgba(0,0,0,0.8);
    }

    details{
        /* cursor:pointer; */
        padding:10px;
    }

    summary{
        font-size:2rem;
        letter-spacing:3px;
        color:#f4d8a4;
        list-style:none;
    }

    ul{
        margin-top:20px;
        padding-left:20px;
    }

    li{
        color: #fff;
        margin:12px 0;
        font-size:1.1rem;
        transition:0.3s;
    }

    li a{
        color:#fff;
        text-decoration:none;
        transition:0.3s;
    }

    li a:hover{
        color:#ffcc66;
        text-shadow:0 0 10px rgba(255,200,100,0.6);
        margin-left:5px;
    }

/* RESPONSIVIDADE MOBILE */

@media (max-width: 768px){

    body{

        overflow-y:auto;

        overflow-x:hidden;
    }

    #fundo-escuro{

        min-height:100vh;

        padding:20px;
    }

    .menu-sumario{

        width:95%;

        margin:20px auto;

        padding:20px;
    }

    summary{

        font-size:1.5rem;

        letter-spacing:1px;

        text-align:center;

        line-height:1.4;
    }

    ul{

        padding-left:10px;
    }

    li{

        font-size:1rem;

        margin:18px 0;

        text-align:center;

        list-style:none;
    }

    li a{

        display:block;

        width:100%;

        padding:12px;

        background:
        rgba(255,255,255,0.04);

        border:
        1px solid rgba(255,255,255,0.08);

        border-radius:8px;
    }

    .menu{

        width:100%;

        display:flex;

        flex-direction:column;

        align-items:center;

        margin-top:20px;

        margin-bottom:30px;
    }

    .menu button{

        width:90%;

        max-width:350px;

        margin:10px 0;

        padding:15px;

        font-size:0.95rem;

        letter-spacing:1px;
    }

}
    </style>
