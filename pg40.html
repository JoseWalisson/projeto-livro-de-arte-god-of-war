<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página 40 - Desafio</title>

<style>
 
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
 
    body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        min-height: 100dvh;
    }
 
    #fundo-escuro {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background:
            linear-gradient(
                to bottom,
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.95)
            ),
            url('Fundo pg4.png');
        background-size: cover;
        background-position: center;
        padding: 30px 0;
    }
 
    main {
        width: 90%;
        max-width: 900px;
        padding: 50px;
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        text-align: center;
        color: white;
        box-shadow: 0 0 40px rgba(0,0,0,0.7);
        margin-bottom: 1em;
    }
 
    h1 {
        color: #f4d8a4;
        font-size: 3rem;
        margin-bottom: 20px;
    }
 
    p {
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: rgba(255,255,255,0.85);
    }
 
    button {
        padding: 15px;
        margin: 10px;
        width: 100%;
        max-width: 400px;
        background: linear-gradient(180deg, #3a0000, #111);
        border: 2px solid #a11;
        color: #f4d8a4;
        font-size: 1.1rem;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        cursor: pointer;
        transition: 0.3s;
        min-height: 48px;
        -webkit-appearance: none;
        appearance: none;
    }
 
    button:hover,
    button:active {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }
 
    /* ===== RESULTADO ===== */
 
    #resultado {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border-radius: 10px;
    }
 
    .vitoria {
        background: rgba(0,80,0,0.4);
        border: 2px solid #2ecc71;
        color: white;
    }
 
    .derrota {
        background: rgba(80,0,0,0.5);
        border: 2px solid #ff0000;
        color: white;
    }
 
    /* ===== TELA DE MORTE ===== */
 
    #death-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        color: red;
        font-size: 3rem;
        text-align: center;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
        padding: 20px;
    }
 
    #death-screen button {
        margin-top: 30px;
        padding: 15px 25px;
        width: auto;
        max-width: none;
        font-size: 1.2rem;
        cursor: pointer;
        background: linear-gradient(180deg, #3a0000, #111);
        border: 2px solid #a11;
        color: #f4d8a4;
        transition: 0.3s;
    }
 
    #death-screen button:hover,
    #death-screen button:active {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,0,0,0.6);
    }
 
    /* ===== MENU ===== */
 
    .menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
        padding: 0 16px;
        width: 100%;
    }
 
    .menu a {
        text-decoration: none;
    }
 
    .botao1, .botao2 {
        margin-right: 0;
    }
 
    .menu button {
        width: 260px;
        margin: 0;
        font-size: 1rem;
        letter-spacing: 1px;
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    }
 
    /* ===== RESPONSIVIDADE MOBILE ===== */
 
    @media (max-width: 768px) {
 
        #fundo-escuro {
            padding: 20px 0 30px;
            justify-content: flex-start;
        }
 
        main {
            width: 92%;
            padding: 24px 20px;
            margin: 20px 0;
        }
 
        h1 {
            font-size: clamp(1.4rem, 6vw, 2rem);
            line-height: 1.3;
            margin-bottom: 16px;
        }
 
        p {
            font-size: clamp(0.9rem, 3.8vw, 1rem);
            line-height: 1.8;
            margin-bottom: 16px;
        }
 
        button {
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            padding: 14px 12px;
            margin: 6px 0;
        }
 
        #death-screen {
            font-size: clamp(1.5rem, 8vw, 2.5rem);
        }
 
        #death-screen button {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            padding: 14px 20px;
        }
 
        .menu {
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
        }
 
        .menu a {
            width: 92%;
            max-width: 350px;
        }
 
        .menu button {
            width: 100%;
            max-width: 350px;
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            letter-spacing: 1px;
            padding: 15px;
        }
    }
 
    /* ===== TELAS MUITO PEQUENAS ===== */
 
    @media (max-width: 360px) {
 
        main {
            width: 96%;
            padding: 18px 14px;
        }
 
        h1 {
            font-size: 1.2rem;
        }
 
        p {
            font-size: 0.88rem;
        }
    }
 
    /* ===== LANDSCAPE MOBILE ===== */
 
    @media (max-height: 500px) and (orientation: landscape) {
 
        #fundo-escuro {
            padding: 16px 0 20px;
        }
 
        main {
            width: 88%;
            padding: 20px 24px;
            margin: 12px 0;
        }
 
        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
 
        .menu {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
 
        .menu a {
            width: auto;
        }
 
        .menu button {
            width: auto;
            min-width: 180px;
            padding: 12px 16px;
            font-size: 0.8rem;
        }
    }
 
</style>
</head>

<body>

<div id="fundo-escuro">
<main>

<h1>⚔ TESTE DE CONHECIMENTO</h1>

<p>Durante a batalha de abertura de God of War III, qual deus olímpico ataca primeiro Kratos e os Titãs enquanto escalam o Monte Olimpo, emergindo das águas em uma forma colossal e aquática?</p>

<button onclick="responder(false)">Hades</button>
<button onclick="responder(true)">Poseidon</button>
<button onclick="responder(false)">Zeus</button>
<button onclick="responder(false)">Héracles</button>

<div id="resultado"></div>

</main>

<div class="menu">
<a class="botao1" href="projeto-artbook-god-of-war.html">
    <button>Voltar ao início</button></a>
<a class="botao2" href="pg40.html"><button>Voltar Página 39</button>
</a>
<a href="pg41.html"><button>Continuar Página 41</button></a>
</div>
</div>

<div id="death-screen">
💀 VOCÊ MORREU 💀
<button onclick="tentarNovamente()">TENTAR NOVAMENTE</button>
</div>

<script>
function responder(c){
let r=document.getElementById("resultado");
r.style.display="block";

if(c){
r.className="vitoria";
r.innerHTML="<h2>🏆 ITEM DESBLOQUEADO!</h2><p>Você desbloqueou: Poseidon — Conceito de Arte Oficial</p>";
}else{
r.className="derrota";
r.innerHTML="<h2>❌ ERROU</h2><p>Os deuses não toleram falhas.</p>";
document.getElementById("death-screen").style.display="flex";
}
}

function tentarNovamente(){
document.getElementById("death-screen").style.display="none";
document.getElementById("resultado").style.display="none";
}
</script>

</body>
</html>
