<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God of War - Artbook</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    }

    body{
    width:100vw;
    height:100vh;
    min-height:100vh;

    overflow:hidden;

    background:black;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;
}

    /* ===== VIDEO / IMAGEM DE FUNDO ===== */

    .background{
    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;
    object-position:center;

    z-index:-3;

    opacity:0.45;
}

    /* ===== OVERLAY ESCURO ===== */

    .overlay{

    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    background:
    radial-gradient(
    circle,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.65) 55%,
    rgba(0,0,0,0.95) 100%);

    z-index:-2;

    }

    /* ===== CONTAINER ===== */

    .container{
      text-align:center;
      color:white;
    }

    /* ===== LOGO ===== */

    .logo{
      width:700px;
      max-width:90%;
      margin-bottom:60px;

      animation: fadeIn 2s ease;
      filter:
      drop-shadow(0 0 20px rgba(255,0,0,0.5))
      drop-shadow(0 0 50px rgba(255,140,0,0.3));
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(-30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* ===== MENU ===== */

    .menu{
      display:flex;
      flex-direction:column;
      gap:25px;
      align-items:center;
    }

    .menu button{

      width:320px;
      padding:18px;

      background:linear-gradient(
      180deg,
      rgba(70,0,0,0.9),
      rgba(15,15,15,0.95));

      border:2px solid #a11;
      color:#f4d8a4;

      font-size:1.2rem;
      letter-spacing:3px;
      text-transform:uppercase;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 0 10px rgba(255,0,0,0.3),
      inset 0 0 10px rgba(255,255,255,0.08);
    }

    .menu button:hover{

      transform:scale(1.05);

      background:linear-gradient(
      180deg,
      rgba(120,0,0,1),
      rgba(30,0,0,1));

      box-shadow:
      0 0 25px rgba(255,0,0,0.7),
      0 0 50px rgba(255,120,0,0.3);
    }

    /* ===== FRASE INFERIOR ===== */

.quote {
  position: fixed;        /* troca absolute por fixed */
  bottom: 20px;           /* menos espaço no mobile */
  left: 0;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.55);
  font-size: 0.75rem;     /* menor no mobile */
  letter-spacing: 1.5px;
  padding: 0 16px;        /* evita cortar nas bordas */
  line-height: 1.4;
  z-index: 10;
}

    /* Botão de habilitar áudio */

    #audioButton{

    position:absolute;

    top:30px;
    right:30px;

    padding:14px 22px;

    background:rgba(0,0,0,0.7);

    border:2px solid #8b0000;

    color:#f4d8a4;

    font-size:0.9rem;

    letter-spacing:2px;

    cursor:pointer;

    transition:0.3s;

    z-index:1000;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 15px rgba(255,0,0,0.25);
}

#audioButton:hover{

    transform:scale(1.05);

    background:rgba(80,0,0,0.9);

    box-shadow:
    0 0 20px rgba(255,0,0,0.5);
}
    @media (max-width: 480px) {
  .logo {
    width: 90%;
    margin-bottom: 30px;
  }

  .menu button {
    width: 85vw;
    font-size: 1rem;
    padding: 14px;
  }

  .container {
    padding-bottom: 80px; /* espaço para a frase não sobrepor */
  }

  .quote {
    font-size: 0.7rem;
    bottom: 16px;
    letter-spacing: 1px;
  }
    }

  </style>
</head>

<body>

  <!-- ===== IMAGEM OU VIDEO DE FUNDO ===== -->

  <img src="fundo-god-of-war.png" class="background">


  <div class="overlay"></div>
  <div class="particles"></div>
  <div class="fire"></div>

  <!-- ===== ÁUDIO ===== -->

  <audio id="menuMusic" loop>
      <source src="trilha sonora god of war.mp3">
  </audio>

  <!-- ===== CONTEÚDO ===== -->

  <div class="container">

      <!-- LOGO -->

      <img src="God-of-War-Logo-PNG.png" class="logo">

      <!-- MENU -->

      <div class="menu">

          <button onclick="startJourney()">
            INICIAR A JORNADA AO OLIMPO
          </button>

          <button onclick="openCredits()">
            CRÉDITOS DOS MORTAIS
          </button>

          <button id="audioButton" onclick="toggleMusic()">
             🔇 HABILITAR TRILHA SONORA
            </button>

      </div>

  </div>

  <!-- FRASE -->

  <div class="quote">
      “Os deuses do Olimpo me abandonaram... agora restam apenas memórias.”
  </div>

  <script>

    // ===== MÚSICA =====

    const music = document.getElementById("menuMusic");

    // volume inicial
    music.volume = 0.4;

    // autoplay moderno
    window.addEventListener("load", () => {

        const playPromise = music.play();

        if(playPromise !== undefined){

            playPromise.catch(() => {

                // navegador bloqueou autoplay
                // toca ao primeiro clique

                document.body.addEventListener("click", () => {
                    music.play();
                }, { once:true });

            });

        }

    });

    // ===== FADE OUT =====

    function fadeOutMusic(callback){

        let fade = setInterval(() => {

            if(music.volume > 0.02){

                music.volume -= 0.02;

            }else{

                music.pause();

                clearInterval(fade);

                if(callback){
                    callback();
                }

            }

        }, 80);

    }

    // ===== BOTÃO INICIAR =====

    function startJourney(){

        const click = new Audio("trilha sonora god of war.mp3");

        click.volume = 0.7;

        click.play();

        // fade da música
        fadeOutMusic(() => {

            window.location.href = "pg2.html";

        });

    }

    // ===== BOTÃO CRÉDITOS =====

    function openCredits(){

        const click = new Audio("trilha sonora god of war.mp3");

        click.volume = 0.7;

        click.play();

        window.location.href = "creditos.html";

    }

  </script>

</body>
</html>
