<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>God of War - Artbook</title>

  <style>

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: black;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== IMAGEM DE FUNDO ===== */

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: -3;
      opacity: 0.45;
    }

    /* ===== OVERLAY ===== */

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        circle,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.65) 55%,
        rgba(0,0,0,0.95) 100%
      );
      z-index: -2;
    }

    /* ===== CONTAINER ===== */

    .container {
      text-align: center;
      color: white;
      width: 100%;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ===== LOGO ===== */

    .logo {
      width: min(700px, 85vw);
      margin-bottom: clamp(30px, 6vh, 60px);
      animation: fadeIn 2s ease;
      filter:
        drop-shadow(0 0 20px rgba(255,0,0,0.5))
        drop-shadow(0 0 50px rgba(255,140,0,0.3));
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== MENU ===== */

    .menu {
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 3vh, 25px);
      align-items: center;
      width: 100%;
    }

    .menu button {
      width: min(320px, 88vw);
      padding: clamp(14px, 2.5vh, 18px) 16px;
      background: linear-gradient(
        180deg,
        rgba(70,0,0,0.9),
        rgba(15,15,15,0.95)
      );
      border: 2px solid #a11;
      color: #f4d8a4;
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      letter-spacing: clamp(1px, 0.5vw, 3px);
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      box-shadow:
        0 0 10px rgba(255,0,0,0.3),
        inset 0 0 10px rgba(255,255,255,0.08);
      /* Área de toque mínima recomendada */
      min-height: 48px;
      /* Evita zoom ao focar em iOS */
      -webkit-appearance: none;
      appearance: none;
    }

    .menu button:hover,
    .menu button:active {
      transform: scale(1.05);
      background: linear-gradient(
        180deg,
        rgba(120,0,0,1),
        rgba(30,0,0,1)
      );
      box-shadow:
        0 0 25px rgba(255,0,0,0.7),
        0 0 50px rgba(255,120,0,0.3);
    }

    /* ===== BOTÃO DE ÁUDIO ===== */

    #audioButton {
      position: fixed;
      top: max(16px, env(safe-area-inset-top, 16px));
      right: 16px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #8b0000;
      color: #f4d8a4;
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
      z-index: 1000;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(255,0,0,0.25);
      min-height: 48px;
      min-width: 48px;
      -webkit-appearance: none;
      appearance: none;
    }

    #audioButton:hover,
    #audioButton:active {
      transform: scale(1.05);
      background: rgba(80,0,0,0.9);
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }

    /* ===== FRASE INFERIOR ===== */

    .quote {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      left: 0;
      right: 0;
      padding: 0 20px;
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-size: clamp(0.65rem, 2.2vw, 0.9rem);
      letter-spacing: clamp(1px, 0.3vw, 2px);
      line-height: 1.5;
    }

    /* ===== ORIENTAÇÃO LANDSCAPE EM MOBILE ===== */

    @media (max-height: 500px) and (orientation: landscape) {
      .logo {
        width: min(350px, 40vw);
        margin-bottom: 16px;
      }

      .menu {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .menu button {
        width: min(240px, 42vw);
        padding: 10px 14px;
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      .quote {
        display: none;
      }
    }

    /* ===== TELAS MUITO PEQUENAS ===== */

    @media (max-width: 320px) {
      .menu button {
        width: 92vw;
        font-size: 0.85rem;
        letter-spacing: 1px;
      }
    }

  </style>
</head>

<body>

  <!-- FUNDO -->
  <img src="fundo-god-of-war.png" class="background" alt="">

  <div class="overlay"></div>

  <!-- ÁUDIO -->
  <audio id="menuMusic" loop>
    <source src="trilha sonora god of war.mp3">
  </audio>

  <!-- BOTÃO DE ÁUDIO (fora do .container para ficar fixo) -->
  <button id="audioButton" onclick="toggleMusic()">
    🔇 TRILHA SONORA
  </button>

  <!-- CONTEÚDO -->
  <div class="container">

    <img src="God-of-War-Logo-PNG.png" class="logo" alt="God of War">

    <div class="menu">

      <button onclick="startJourney()">
        INICIAR A JORNADA AO OLIMPO
      </button>

      <button onclick="openCredits()">
        CRÉDITOS DOS MORTAIS
      </button>

    </div>

  </div>

  <!-- FRASE -->
  <div class="quote">
    "Os deuses do Olimpo me abandonaram... agora restam apenas memórias."
  </div>

  <script>

    const music = document.getElementById("menuMusic");
    const audioBtn = document.getElementById("audioButton");
    let musicEnabled = false;

    music.volume = 0.4;

    // Autoplay moderno — tenta ao carregar
    window.addEventListener("load", () => {
      const playPromise = music.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          musicEnabled = true;
          audioBtn.textContent = "🔊 TRILHA SONORA";
        }).catch(() => {
          // Bloqueado pelo navegador — aguarda interação
          document.body.addEventListener("click", tryAutoplay, { once: true });
        });
      }
    });

    function tryAutoplay() {
      music.play().then(() => {
        musicEnabled = true;
        audioBtn.textContent = "🔊 TRILHA SONORA";
      }).catch(() => {});
    }

    function toggleMusic() {
      if (musicEnabled) {
        music.pause();
        musicEnabled = false;
        audioBtn.textContent = "🔇 TRILHA SONORA";
      } else {
        music.play().then(() => {
          musicEnabled = true;
          audioBtn.textContent = "🔊 TRILHA SONORA";
        }).catch(() => {});
      }
    }

    function fadeOutMusic(callback) {
      let fade = setInterval(() => {
        if (music.volume > 0.02) {
          music.volume -= 0.02;
        } else {
          music.pause();
          clearInterval(fade);
          if (callback) callback();
        }
      }, 80);
    }

    function startJourney() {
      fadeOutMusic(() => {
        window.location.href = "pg2.html";
      });
    }

    function openCredits() {
      window.location.href = "creditos.html";
    }

  </script>

</body>
</html>
