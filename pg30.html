<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página 30 - Desafio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    overflow-x:hidden;
    overflow-y:auto;
}

#fundo-escuro{

    width:100vw;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    linear-gradient(
    to bottom,
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.95)
    ),
    url('Fundo pg3.png');

    background-size:cover;
    background-position:center;
}

main{

    width:90%;
    max-width:900px;

    padding:50px;

    background:rgba(0,0,0,0.4);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:12px;

    text-align:center;

    color:white;

    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

h1{

    color:#f4d8a4;
    font-size:3rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    margin-bottom:20px;
    color:rgba(255,255,255,0.85);
}

button{

    padding:15px;
    margin:10px;

    width:100%;
    max-width:400px;

    background:linear-gradient(180deg,#3a0000,#111);

    border:2px solid #a11;

    color:#f4d8a4;

    font-size:1.1rem;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* ===== TELA DE RESULTADO ===== */

#resultado{

    display:none;

    margin-top:30px;

    padding:30px;

    border-radius:12px;
}

.vitoria{

    background:rgba(0,80,0,0.4);
    border:2px solid #2ecc71;
}

.derrota{

    background:rgba(80,0,0,0.5);
    border:2px solid #ff0000;
}

/* ===== OVERLAY MORTE ===== */


    #death-screen button{

    margin-top:30px;

    padding:15px 25px;

    font-size:1.2rem;

    cursor:pointer;

    background:linear-gradient(180deg,#3a0000,#111);

    border:2px solid #a11;

    color:#f4d8a4;

    transition:0.3s;
}

#death-screen button:hover{

    transform:scale(1.05);

    box-shadow:0 0 20px rgba(255,0,0,0.6);
}

/* RESULTADO */
#resultado{

    margin-top:20px;
    padding:20px;
    display:none;
    border-radius:10px;
}

.vitoria{
    background:rgba(0,80,0,0.4);
    border:2px solid #2ecc71;
    color:white;
}

.derrota{
    background:rgba(80,0,0,0.5);
    border:2px solid #ff0000;
    color:white;
}

/* MORTE */
#death-screen{

    display:none;

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.95);

    color:red;

    font-size:3rem;

    text-align:center;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    z-index:999;
}

.menu {
    display: flex;
}

.botao1, .botao2 {
    margin-right: 1em;
}

</style>
</head>

<body>

<div id="fundo-escuro">
<main>

<h1>⚔ TESTE DE CONHECIMENTO</h1>

<p>
Qual evento marca o início da guerra final contra o Olimpo em God of War III?
</p>

<button onclick="responder(false)">Kratos destrói Esparta</button>

<button onclick="responder(true)">Os Titãs escalam o Monte Olimpo ao lado de Kratos</button>

<button onclick="responder(false)">Ares retorna do submundo</button>

<button onclick="responder(false)">Athena derrota Zeus</button>

<div id="resultado"></div>

</main>

<div class="menu">
<a class="botao1" href="projeto-artbook-god-of-war.html">
    <button>Voltar ao início</button></a>
<a class="botao2" href="pg29.html"><button>Voltar Página 29</button>
</a>
<a href="pg31.html"><button>Continuar Página 31</button></a>
</div>
</div>

<div id="death-screen">
💀 VOCÊ MORREU 💀
<button onclick="tentarNovamente()">TENTAR NOVAMENTE</button>
</div>

<script>
function responder(c){
let r=document.getElementById("resultado");
r.style.display="block";

if(c){
r.className="vitoria";
r.innerHTML="<h2>✔ CORRETO</h2><p>Os Titãs iniciam a invasão do Olimpo ao lado de Kratos.</p>";
}else{
r.className="derrota";
r.innerHTML="<h2>❌ ERROU</h2><p>Os deuses não toleram falhas.</p>";
document.getElementById("death-screen").style.display="flex";
}
}

function tentarNovamente(){
document.getElementById("death-screen").style.display="none";
document.getElementById("resultado").style.display="none";
}
</script>

</body>
</html>
